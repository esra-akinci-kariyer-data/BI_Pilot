name: Deploy static content to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: "pages"
      cancel-in-progress: true
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Build static content for Pages
        run: |
          mkdir -p public
          echo "<h1>Raportal Agent PoC</h1>" > public/index.html

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v1
        with:
          path: public

      - uses: actions/deploy-pages@v1
